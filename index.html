<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.2, user-scalable=yes" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- Add Icons -->
    <link rel="icon" type="image/ico" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="160x160" href="/apple-touch-icon.png" />
    <title>UI Vite Sample</title>
  </head>

  <body>
    <div class="site-wrapper forfixed">
      <header class="header">
        <div class="container">
          <div class="row">
            <div class="col-100 flex justify-between items-center">
              <a href="/" class="logowrap">
                <img class="logotype" src="/assets/images/logo/logo-diamed.jpg" alt="logo" />
              </a>
              <nav class="menu">
                <ul class="main-menu">
                  <li><a href="">Lorem</a></li>
                  <li><a href="">Deserunt</a></li>
                  <li><a href="">Sint</a></li>
                  <li><a href="">Aliquid</a></li>
                  <li><a href="">Delectus</a></li>
                  <li><button class="button button--startcontact js-startcontact">Оставить заявку</button></li>
                </ul>
              </nav>
            </div>
          </div>
        </div>
      </header>

      <main class="site-content">
        <section class="hero masthead-home">
          <div class="container">
            <div class="row no-gutters">
              <div class="col-42 flex justify-start items-center content-wrap">
                <div class="masthead-title">
                  <h1 class="h1-title">
                    Ремонт и сервисное обслуживание
                    <span>вилочных и фронтальных погрузчиков</span>
                  </h1>
                  <div class="button-wrap">
                    <a href="/" class="button button--hero" target="">Узнать больше</a>
                  </div>
                  <p class="subtitle">
                    Ивантеевка
                    <span>и рядом</span>
                  </p>
                </div>
              </div>
              <div class="col-58">
                <div class="masthead-imgwrap">
                  <img class="item-present" src="/assets/images/hero/diploma.webp" alt="Погрузчик" />
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer"></footer>
    </div>

    <script type="module" crossorigin src="/src/main.ts"></script>
  </body>
</html>
